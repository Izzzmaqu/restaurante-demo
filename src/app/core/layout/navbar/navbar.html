<!-- Navbar fijo: siempre visible arriba, transición suave al fondo cuando se hace scroll -->
<nav
  [ngClass]="{
    'bg-black/85 backdrop-blur-lg shadow-2xl shadow-black/50': scrolled(),
    'bg-transparent': !scrolled()
  }"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
>
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

    <!-- LOGO: click cierra el menú móvil si estuviera abierto -->
    <a routerLink="/inicio" class="flex items-center gap-3" (click)="closeMobileMenu()">
      <div class="w-8 h-8 rounded-full bg-amber-500 flex items-center justify-center">
        <span class="text-black font-bold text-sm">BV</span>
      </div>
      <div class="flex flex-col leading-tight">
        <span class="text-xl font-bold text-white font-heading">Bella Vista</span>
        <span class="text-[10px] text-amber-400 uppercase tracking-[0.2em] hidden sm:block">Restaurante</span>
      </div>
    </a>

    <!-- LINKS DESKTOP: visibles solo en pantallas medianas y grandes -->
    <ul class="hidden md:flex items-center gap-8">
      <!-- @for es la nueva sintaxis de Angular 17+ que reemplaza *ngFor -->
      @for (link of navLinks; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="!text-amber-400"
            class="text-gray-400 hover:text-white transition-colors duration-200 text-sm uppercase tracking-wider"
          >
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- BOTÓN CTA: reservar mesa (solo desktop) -->
    <a
      routerLink="/reservaciones"
      class="hidden md:inline-flex items-center gap-2 bg-amber-500 hover:bg-amber-400 active:scale-95 text-black font-bold text-sm px-5 py-2.5 rounded-full transition-all duration-200 uppercase tracking-wide"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Reservar Mesa
    </a>

    <!-- BOTÓN HAMBURGUESA: solo visible en móvil -->
    <button
      (click)="toggleMobileMenu()"
      class="md:hidden p-2 text-gray-400 hover:text-amber-400 transition-colors rounded-lg"
      aria-label="Abrir menú de navegación"
    >
      <!-- @if es la nueva sintaxis que reemplaza *ngIf -->
      @if (mobileMenuOpen()) {
        <!-- Ícono X para cerrar el menú -->
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      } @else {
        <!-- Ícono de tres líneas (hamburguesa) -->
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      }
    </button>
  </div>

  <!-- MENÚ MÓVIL: se muestra/oculta con @if según el signal mobileMenuOpen -->
  @if (mobileMenuOpen()) {
    <div class="md:hidden bg-zinc-950/98 border-t border-zinc-800 px-6 py-6 space-y-4">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-amber-400"
          class="block text-gray-300 hover:text-amber-400 transition-colors uppercase tracking-wider text-sm py-2"
          (click)="closeMobileMenu()"
        >
          {{ link.label }}
        </a>
      }
      <!-- Botón CTA en el menú móvil -->
      <a
        routerLink="/reservaciones"
        class="inline-block mt-2 bg-amber-500 hover:bg-amber-400 text-black font-bold px-6 py-3 rounded-full text-sm uppercase tracking-wide transition-all"
        (click)="closeMobileMenu()"
      >
        Reservar Mesa
      </a>
    </div>
  }
</nav>
